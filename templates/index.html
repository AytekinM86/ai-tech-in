<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Tech-In</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0f0f0f; color: #e0e0e0; display: flex; height: 100vh; }
        .sidebar { width: 260px; background: #1a1a1a; border-right: 1px solid #333; display: flex; flex-direction: column; padding: 16px; transition: all 0.3s; }
        .sidebar h2 { color: #fff; font-size: 18px; margin-bottom: 20px; }
        .new-chat-btn { background: #2563eb; color: #fff; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; margin-bottom: 16px; font-size: 14px; }
        .new-chat-btn:hover { background: #1d4ed8; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 10px; border-radius: 8px; cursor: pointer; font-size: 13px; color: #ccc; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }
        .chat-item:hover { background: #2a2a2a; }
        .chat-item.active { background: #2563eb22; color: #fff; }
        .chat-item .del { cursor: pointer; font-size: 12px; opacity: 0.5; margin-left: 6px; flex-shrink: 0; }
        .chat-item .del:hover { opacity: 1; color: #ef4444; }
        .chat-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 16px 24px; border-bottom: 1px solid #333; background: #1a1a1a; display: flex; align-items: center; gap: 12px; }
        .header h1 { font-size: 20px; color: #fff; }
        .menu-btn { display: none; background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; }
        .messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
        .message { max-width: 75%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
        .user-msg { background: #2563eb; color: #fff; align-self: flex-end; border-radius: 12px 12px 4px 12px; }
        .bot-msg { background: #252525; color: #e0e0e0; align-self: flex-start; border-radius: 12px 12px 12px 4px; }
        .input-area { padding: 16px 24px; border-top: 1px solid #333; background: #1a1a1a; display: flex; flex-direction: column; gap: 8px; }
        .file-preview { display: flex; flex-wrap: wrap; gap: 8px; }
        .file-tag { background: #2a2a2a; border: 1px solid #444; padding: 4px 10px; border-radius: 20px; font-size: 12px; color: #aaa; display: flex; align-items: center; gap: 6px; }
        .file-tag span { cursor: pointer; color: #888; }
        .input-row { display: flex; gap: 8px; align-items: center; }
        .attach-btn { background: #2a2a2a; border: 1px solid #444; padding: 10px 14px; border-radius: 8px; color: #aaa; cursor: pointer; font-size: 18px; }
        .attach-btn:hover { background: #333; }
        .input-row input[type=text] { flex: 1; background: #2a2a2a; border: 1px solid #444; color: #e0e0e0; padding: 12px 16px; border-radius: 8px; font-size: 14px; outline: none; }
        .input-row input[type=text]:focus { border-color: #2563eb; }
        .send-btn { background: #2563eb; color: #fff; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .send-btn:hover { background: #1d4ed8; }
        .typing { color: #888; font-size: 13px; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 99; }

        @media (max-width: 768px) {
            .menu-btn { display: block; }
            .sidebar { position: fixed; left: -280px; top: 0; height: 100%; z-index: 100; width: 260px; }
            .sidebar.open { left: 0; }
            .overlay.open { display: block; }
            .message { max-width: 90%; font-size: 13px; }
            .input-area { padding: 12px 16px; }
            .messages { padding: 16px; }
        }
    </style>
</head>
<body>
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <h2>🤖 AI-Tech-In</h2>
        <button class="new-chat-btn" onclick="newChat()">+ Yeni söhbət</button>
        <div class="chat-list" id="chatList"></div>
    </div>

    <div class="main">
        <div class="header">
            <button class="menu-btn" onclick="toggleSidebar()">☰</button>
            <h1 id="chatTitle">AI-Tech-In</h1>
        </div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <div class="file-preview" id="filePreview"></div>
            <div class="input-row">
                <label class="attach-btn" for="fileInput">📎</label>
                <input type="file" id="fileInput" multiple accept=".pdf,.txt,.jpg,.jpeg,.png,.webp" style="display:none" onchange="handleFiles()">
                <input type="text" id="msgInput" placeholder="Mesajınızı yazın..." onkeydown="if(event.key==='Enter') sendMsg()">
                <button class="send-btn" onclick="sendMsg()">➤</button>
            </div>
        </div>
    </div>

    <script>
        let chats = JSON.parse(localStorage.getItem('chats') || '[]');
        let currentChat = null;
        let selectedFiles = [];

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('open');
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('overlay').classList.remove('open');
        }

        function renderSidebar() {
            const list = document.getElementById('chatList');
            list.innerHTML = '';
            chats.forEach((c, i) => {
                const div = document.createElement('div');
                div.className = 'chat-item' + (currentChat === i ? ' active' : '');

                const title = document.createElement('span');
                title.className = 'chat-title';
                title.textContent = c.title || 'Söhbət ' + (i+1);
                title.onclick = () => { loadChat(i); closeSidebar(); };

                const del = document.createElement('span');
                del.className = 'del';
                del.textContent = '🗑';
                del.onclick = (e) => {
                    e.stopPropagation();
                    chats.splice(i, 1);
                    if (currentChat === i) {
                        currentChat = chats.length > 0 ? 0 : null;
                        document.getElementById('messages').innerHTML = '';
                        if (currentChat === 0) loadChat(0);
                    } else if (currentChat > i) {
                        currentChat--;
                    }
                    saveChats();
                    renderSidebar();
                };

                div.appendChild(title);
                div.appendChild(del);
                list.appendChild(div);
            });
        }

        function newChat() {
            chats.unshift({ title: 'Yeni söhbət', messages: [] });
            currentChat = 0;
            saveChats();
            renderSidebar();
            document.getElementById('messages').innerHTML = '';
            closeSidebar();
        }

        function loadChat(i) {
            currentChat = i;
            renderSidebar();
            const msgs = document.getElementById('messages');
            msgs.innerHTML = '';
            chats[i].messages.forEach(m => addBubble(m.role, m.content));
        }

        function addBubble(role, text) {
            const msgs = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = role === 'user' ? 'message user-msg' : 'message bot-msg';
            div.textContent = text;
            msgs.appendChild(div);
            msgs.scrollTop = msgs.scrollHeight;
        }

        function saveChats() {
            localStorage.setItem('chats', JSON.stringify(chats));
        }

        function handleFiles() {
            const input = document.getElementById('fileInput');
            selectedFiles = Array.from(input.files);
            renderFilePreview();
        }

        function renderFilePreview() {
            const preview = document.getElementById('filePreview');
            preview.innerHTML = '';
            selectedFiles.forEach((f, i) => {
                const tag = document.createElement('div');
                tag.className = 'file-tag';
                tag.innerHTML = `📄 ${f.name} <span onclick="removeFile(${i})">✕</span>`;
                preview.appendChild(tag);
            });
        }

        function removeFile(i) {
            selectedFiles.splice(i, 1);
            renderFilePreview();
        }

        async function sendMsg() {
            const input = document.getElementById('msgInput');
            const msg = input.value.trim();
            if (!msg && selectedFiles.length === 0) return;
            input.value = '';

            if (currentChat === null) {
                chats.unshift({ title: msg.substring(0, 30) || 'Fayl', messages: [] });
                currentChat = 0;
                renderSidebar();
            }

            const displayMsg = msg + (selectedFiles.length > 0 ? ` 📎 ${selectedFiles.length} fayl` : '');
            chats[currentChat].messages.push({ role: 'user', content: displayMsg });
            if (chats[currentChat].title === 'Yeni söhbət') {
                chats[currentChat].title = (msg || 'Fayl').substring(0, 30);
            }
            addBubble('user', displayMsg);
            saveChats();
            renderSidebar();

            const typing = document.createElement('div');
            typing.className = 'typing';
            typing.id = 'typing';
            typing.textContent = '...';
            document.getElementById('messages').appendChild(typing);

            const formData = new FormData();
            formData.append('message', msg);
            formData.append('history', JSON.stringify(chats[currentChat].messages.slice(0, -1)));
            selectedFiles.forEach(f => formData.append('files', f));

            const res = await fetch('/chat', { method: 'POST', body: formData });
            const data = await res.json();
            document.getElementById('typing')?.remove();

            chats[currentChat].messages.push({ role: 'assistant', content: data.response });
            addBubble('assistant', data.response);
            saveChats();

            selectedFiles = [];
            renderFilePreview();
            document.getElementById('fileInput').value = '';
        }

        renderSidebar();
        if (chats.length > 0) loadChat(0);
    </script>
</body>
</html>
