<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Tech-In</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0f0f0f; color: #e0e0e0; display: flex; height: 100vh; }
        
        .sidebar { width: 260px; background: #1a1a1a; border-right: 1px solid #333; display: flex; flex-direction: column; padding: 16px; }
        .sidebar h2 { color: #fff; font-size: 18px; margin-bottom: 20px; }
        .new-chat-btn { background: #2563eb; color: #fff; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; margin-bottom: 16px; font-size: 14px; }
        .new-chat-btn:hover { background: #1d4ed8; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 10px; border-radius: 8px; cursor: pointer; font-size: 13px; color: #ccc; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-item:hover { background: #2a2a2a; }
        .chat-item.active { background: #2563eb22; color: #fff; }

        .main { flex: 1; display: flex; flex-direction: column; }
        .header { padding: 16px 24px; border-bottom: 1px solid #333; background: #1a1a1a; }
        .header h1 { font-size: 20px; color: #fff; }

        .messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
        .message { max-width: 75%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
        .user-msg { background: #2563eb; color: #fff; align-self: flex-end; border-radius: 12px 12px 4px 12px; }
        .bot-msg { background: #252525; color: #e0e0e0; align-self: flex-start; border-radius: 12px 12px 12px 4px; }

        .input-area { padding: 16px 24px; border-top: 1px solid #333; background: #1a1a1a; display: flex; gap: 12px; }
        .input-area input { flex: 1; background: #2a2a2a; border: 1px solid #444; color: #e0e0e0; padding: 12px 16px; border-radius: 8px; font-size: 14px; outline: none; }
        .input-area input:focus { border-color: #2563eb; }
        .send-btn { background: #2563eb; color: #fff; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .send-btn:hover { background: #1d4ed8; }
        .typing { color: #888; font-size: 13px; padding: 8px 16px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>🤖 AI-Tech-In</h2>
        <button class="new-chat-btn" onclick="newChat()">+ Yeni söhbət</button>
        <div class="chat-list" id="chatList"></div>
    </div>

    <div class="main">
        <div class="header"><h1 id="chatTitle">AI-Tech-In</h1></div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Mesajınızı yazın..." onkeydown="if(event.key==='Enter') sendMsg()">
            <button class="send-btn" onclick="sendMsg()">➤</button>
        </div>
    </div>

    <script>
        let chats = JSON.parse(localStorage.getItem('chats') || '[]');
        let currentChat = null;

        function renderSidebar() {
            const list = document.getElementById('chatList');
            list.innerHTML = '';
            chats.forEach((c, i) => {
                const div = document.createElement('div');
                div.className = 'chat-item' + (currentChat === i ? ' active' : '');
                div.textContent = c.title || 'Söhbət ' + (i+1);
                div.onclick = () => loadChat(i);
                list.appendChild(div);
            });
        }

        function newChat() {
            chats.unshift({ title: 'Yeni söhbət', messages: [] });
            currentChat = 0;
            saveChats();
            renderSidebar();
            document.getElementById('messages').innerHTML = '';
        }

        function loadChat(i) {
            currentChat = i;
            renderSidebar();
            const msgs = document.getElementById('messages');
            msgs.innerHTML = '';
            chats[i].messages.forEach(m => addBubble(m.role, m.content));
        }

        function addBubble(role, text) {
            const msgs = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = role === 'user' ? 'message user-msg' : 'message bot-msg';
            div.textContent = text;
            msgs.appendChild(div);
            msgs.scrollTop = msgs.scrollHeight;
        }

        function saveChats() {
            localStorage.setItem('chats', JSON.stringify(chats));
        }

        async function sendMsg() {
            const input = document.getElementById('msgInput');
            const msg = input.value.trim();
            if (!msg) return;
            input.value = '';

            if (currentChat === null) {
                chats.unshift({ title: msg.substring(0, 30), messages: [] });
                currentChat = 0;
                renderSidebar();
            }

            chats[currentChat].messages.push({ role: 'user', content: msg });
            if (chats[currentChat].title === 'Yeni söhbət') {
                chats[currentChat].title = msg.substring(0, 30);
            }
            addBubble('user', msg);
            saveChats();
            renderSidebar();

            const typing = document.createElement('div');
            typing.className = 'typing';
            typing.id = 'typing';
            typing.textContent = '...';
            document.getElementById('messages').appendChild(typing);

            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: msg, history: chats[currentChat].messages.slice(0, -1) })
            });
            const data = await res.json();
            document.getElementById('typing')?.remove();

            chats[currentChat].messages.push({ role: 'assistant', content: data.response });
            addBubble('assistant', data.response);
            saveChats();
        }

        renderSidebar();
        if (chats.length > 0) loadChat(0);
    </script>
</body>
</html>
